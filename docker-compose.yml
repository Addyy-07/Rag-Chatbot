version: '3.8'

services:
  # FastAPI Authentication Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docchat_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    networks:
      - docchat_network

  # Streamlit Frontend (RAG UI)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docchat_streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
      - PYTHONPATH=/app
    env_file:
      - .env
    command: streamlit run backend/main.py --server.address=0.0.0.0
    depends_on:
      - api
    networks:
      - docchat_network

  # Next.js Frontend (Auth)
  web:
    image: node:20-alpine
    container_name: docchat_web
    working_dir: /app
    volumes:
      - ./web:/app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
    networks:
      - docchat_network

networks:
  docchat_network:
    driver: bridge
