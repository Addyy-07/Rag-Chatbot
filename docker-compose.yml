version: '3.8'

services:
  # FastAPI Authentication Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docchat_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    networks:
      - docchat_network

  # Streamlit Frontend (RAG UI)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docchat_streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    env_file:
      - .env
    command: streamlit run backend/main.py --server.address=0.0.0.0
    depends_on:
      - api
    networks:
      - docchat_network


networks:
  docchat_network:
    driver: bridge
